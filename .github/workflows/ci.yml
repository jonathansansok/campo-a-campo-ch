name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: productos_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Migraciones en la base de prueba
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/productos_test

      - name: Tests e2e
        run: npm run test:e2e
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/productos_test
          PRECIO_USD: 1400

      - name: Build
        run: npm run build

  imagenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Imagen de la api
        run: docker build ./api

      - name: Imagen del frontend
        run: docker build ./frontend
