services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productos
    ports:
      - "3306:3306"
    volumes:
      - datos_mysql:/var/lib/mysql
    healthcheck:
      # por tcp a proposito: por socket contesta el servidor temporal del init
      # de mysql y el healthy llegaba antes de que la base aceptara conexiones
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    restart: on-failure
    environment:
      DATABASE_URL: mysql://root:root@db:3306/productos
      PRECIO_USD: ${PRECIO_USD:-1400}
      RABBITMQ_URL: amqp://rabbitmq:5672
    ports:
      - "3000:3000"
    # la api solo espera a la base: sin rabbit arranca igual y avisa por log
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_URL: http://api:3000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  datos_mysql:
