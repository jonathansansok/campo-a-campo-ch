services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productos
    ports:
      - "3306:3306"
    volumes:
      - datos_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: mysql://root:root@db:3306/productos
      PRECIO_USD: ${PRECIO_USD:-1400}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      API_URL: http://api:3000
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  datos_mysql:
